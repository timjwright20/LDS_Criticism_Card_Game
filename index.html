<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F5F0; --card: #FFFFFF; --navy: #1C2340; --navy-light: #2D3561;
  --gold: #C9943A; --gold-light: #F0DFB8; --green: #3A8C5C; --green-light: #D4EDDE;
  --red: #C0392B; --red-light: #FADDDA; --muted: #8A8EA8; --border: #E8E4DA;
  --shadow: 0 2px 16px rgba(28,35,64,0.10); --shadow-lg: 0 8px 40px rgba(28,35,64,0.16); --r: 16px;
}
html, body { height: 100%; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--navy); overflow: hidden; }
#root { height: 100%; display: flex; flex-direction: column; }
.screen { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow-y: auto; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 28px; border-radius: 50px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; border: none; transition: all 0.18s ease; user-select: none; -webkit-tap-highlight-color: transparent; }
.btn-primary { background: var(--navy); color: #fff; }
.btn-primary:active { background: var(--navy-light); transform: scale(0.97); }
.btn-gold { background: var(--gold); color: #fff; }
.btn-gold:active { transform: scale(0.97); }
.btn-outline { background: transparent; color: var(--navy); border: 2px solid var(--border); }
.btn-outline:active { background: var(--border); transform: scale(0.97); }
.btn-full { width: 100%; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: flex-end; padding: 0; }
.modal-sheet { background: white; border-radius: 20px 20px 0 0; width: 100%; max-height: 85vh; overflow-y: auto; padding: 0 0 40px; }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 20px; }
.modal-title { font-family: 'DM Serif Display', serif; font-size: 22px; padding: 0 24px 16px; color: var(--navy); }
.rule-item { display: flex; gap: 14px; padding: 14px 24px; border-top: 1px solid var(--border); }
.rule-icon { font-size: 22px; flex-shrink: 0; margin-top: 2px; }
.rule-head { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
.rule-body { font-size: 13px; color: var(--muted); line-height: 1.5; }
.modal-close { display: block; margin: 20px 24px 0; padding: 14px; background: var(--navy); color: white; border: none; border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; width: calc(100% - 48px); }

/* HOME */
.home { background: var(--navy); color: white; justify-content: space-between; }
.home-top { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px 0; }
.home-top-right { display: flex; align-items: center; gap: 8px; }
.rules-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; }
.user-chip { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); border-radius: 50px; padding: 6px 14px 6px 6px; }
.user-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white; overflow: hidden; }
.user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.user-name { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.9); max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sign-in-btn { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); color: white; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; padding: 8px 16px; border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.sign-out-btn { background: none; border: none; color: rgba(255,255,255,0.4); font-size: 11px; font-family: 'DM Sans', sans-serif; cursor: pointer; padding: 2px 6px; }
.home-hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px 32px 32px; text-align: center; }
.home-emblem { width: 72px; height: 72px; background: rgba(201,148,58,0.18); border: 2px solid rgba(201,148,58,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; margin-bottom: 24px; }
.home-title { font-family: 'DM Serif Display', serif; font-size: 32px; line-height: 1.15; margin-bottom: 10px; }
.home-sub { font-size: 15px; color: rgba(255,255,255,0.6); line-height: 1.5; max-width: 280px; }
.home-stats { display: flex; gap: 12px; margin: 28px 0; }
.stat-pill { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 50px; padding: 10px 16px; text-align: center; }
.stat-pill .val { font-size: 22px; font-weight: 700; color: var(--gold); }
.stat-pill .lbl { font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; }
.home-footer { padding: 24px 32px 48px; display: flex; flex-direction: column; gap: 10px; }

/* CATEGORY */
.cat-screen { background: var(--bg); }
.top-bar { display: flex; align-items: center; gap: 12px; padding: 20px 20px 0; }
.back-btn { width: 40px; height: 40px; border-radius: 50%; background: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: var(--shadow); -webkit-tap-highlight-color: transparent; flex-shrink: 0; }
.top-bar h2 { font-size: 20px; font-weight: 600; }
.cat-grid { padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
.cat-card { background: white; border-radius: var(--r); padding: 16px 18px; display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow); cursor: pointer; transition: all 0.15s ease; -webkit-tap-highlight-color: transparent; border: 2px solid transparent; }
.cat-card.selected { border-color: var(--gold); background: #FEFBF5; }
.cat-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.cat-info { flex: 1; }
.cat-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
.cat-count { font-size: 12px; color: var(--muted); margin-top: 2px; }
.cat-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
.cat-check.on { background: var(--gold); border-color: var(--gold); color: white; }
.mode-row { padding: 0 20px; display: flex; gap: 10px; }
.mode-btn { flex: 1; padding: 12px; border-radius: 12px; border: 2px solid var(--border); background: white; cursor: pointer; text-align: center; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; color: var(--navy); transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
.mode-btn.on { border-color: var(--gold); background: var(--gold-light); }
.mode-icon { font-size: 20px; display: block; margin-bottom: 4px; }
.start-bar { padding: 14px 20px 36px; }

/* GAME */
.game-screen { background: var(--bg); overflow: hidden; }
.game-top { padding: 16px 20px 8px; display: flex; align-items: center; gap: 10px; }
.progress-wrap { flex: 1; background: var(--border); border-radius: 50px; height: 6px; overflow: hidden; }
.progress-bar { height: 100%; background: var(--gold); border-radius: 50px; transition: width 0.4s ease; }
.game-meta { padding: 0 20px 10px; display: flex; justify-content: space-between; align-items: center; }
.card-num { font-size: 13px; color: var(--muted); font-weight: 500; }
.streak-badge { font-size: 13px; font-weight: 700; color: var(--gold); background: var(--gold-light); padding: 5px 12px; border-radius: 50px; }
.timer-badge { font-size: 14px; font-weight: 700; padding: 5px 12px; border-radius: 50px; }
.timer-ok { color: var(--green); background: var(--green-light); }
.timer-warn { color: var(--red); background: var(--red-light); }
.category-tag { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); padding: 0 20px 8px; }

/* FLASH CARD */
.card-area { flex: 1; padding: 0 20px; display: flex; flex-direction: column; min-height: 0; }
.flip-wrapper { perspective: 1200px; flex: 1; min-height: 0; }
.flip-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); }
.flip-inner.flipped { transform: rotateY(180deg); }
.card-face { position: absolute; inset: 0; background: white; border-radius: 20px; box-shadow: var(--shadow-lg); backface-visibility: hidden; -webkit-backface-visibility: hidden; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }
.card-back { transform: rotateY(180deg); background: #F9F5EE; }
.card-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
.label-crit { color: var(--red); }
.label-resp { color: var(--green); }
.scripture-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.scripture-ref { display: inline-flex; align-items: center; gap: 6px; background: var(--gold-light); color: var(--navy); font-size: 13px; font-weight: 600; padding: 7px 12px; border-radius: 50px; cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
.scripture-ref:active { background: #E8D09A; }
.scripture-link { display: inline-flex; align-items: center; gap: 5px; background: rgba(28,35,64,0.07); color: var(--navy); font-size: 12px; font-weight: 600; padding: 7px 12px; border-radius: 50px; text-decoration: none; border: none; font-family: 'DM Sans', sans-serif; }
.scripture-expand { background: var(--gold-light); border: 1px solid #E0C88A; border-radius: 12px; padding: 12px; margin-bottom: 12px; font-size: 13px; line-height: 1.6; color: var(--navy); display: none; }

.response-text { font-size: 15px; line-height: 1.65; color: var(--navy); }
.response-intro { font-size: 12px; color: var(--muted); margin-bottom: 10px; font-weight: 500; }
.flip-hint { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-top: 16px; }
.flip-hint-text { font-size: 12px; color: var(--muted); }
.flip-arrows { font-size: 20px; color: var(--muted); letter-spacing: 4px; }

/* NOTES */
.notes-section { margin-top: 14px; border-top: 1px solid rgba(0,0,0,0.08); padding-top: 14px; }
.notes-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.notes-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); }
.notes-save-status { font-size: 11px; color: var(--green); opacity: 0; transition: opacity 0.3s; }
.notes-save-status.visible { opacity: 1; }
.notes-textarea { width: 100%; min-height: 72px; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; line-height: 1.6; color: var(--navy); background: white; resize: vertical; outline: none; transition: border-color 0.15s; }
.notes-textarea:focus { border-color: var(--gold); }
.notes-textarea::placeholder { color: var(--muted); }
.notes-login-prompt { background: rgba(201,148,58,0.1); border: 1px solid var(--gold-light); border-radius: 10px; padding: 10px 14px; font-size: 13px; color: var(--navy); text-align: center; }
.notes-login-prompt button { background: none; border: none; color: var(--gold); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: underline; }

/* GRADE */
.grade-row { padding: 12px 20px 28px; display: flex; gap: 12px; }
.grade-btn { flex: 1; padding: 15px 12px; border-radius: 14px; border: none; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; justify-content: center; gap: 8px; }
.grade-got { background: var(--green-light); color: var(--green); border: 2px solid var(--green); }
.grade-got:active { background: var(--green); color: white; transform: scale(0.97); }
.grade-miss { background: var(--red-light); color: var(--red); border: 2px solid var(--red); }
.grade-miss:active { background: var(--red); color: white; transform: scale(0.97); }
.flip-to-grade { width: 100%; padding: 16px; border-radius: 14px; background: var(--navy); color: white; border: none; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.flip-to-grade:active { background: var(--navy-light); transform: scale(0.98); }

/* RESULTS */
.results-screen { background: var(--navy); color: white; }
.results-hero { padding: 36px 32px 16px; text-align: center; }
.results-emoji { font-size: 52px; margin-bottom: 12px; }
.results-title { font-family: 'DM Serif Display', serif; font-size: 28px; margin-bottom: 6px; }
.results-sub { color: rgba(255,255,255,0.6); font-size: 14px; }
.results-score { font-size: 60px; font-weight: 700; color: var(--gold); line-height: 1; margin: 16px 0 4px; }
.results-score-label { font-size: 13px; color: rgba(255,255,255,0.5); }
.results-stats { display: flex; gap: 10px; padding: 0 20px; margin: 16px 0; }
.results-stat { flex: 1; background: rgba(255,255,255,0.07); border-radius: 14px; padding: 12px 10px; text-align: center; }
.results-stat .v { font-size: 22px; font-weight: 700; margin-bottom: 3px; }
.results-stat .l { font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.4px; }
.results-breakdown { padding: 0 20px; margin-bottom: 16px; }
.results-breakdown h3 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: rgba(255,255,255,0.4); margin-bottom: 10px; }
.result-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
.result-row-name { font-size: 12px; color: rgba(255,255,255,0.8); flex: 1; padding-right: 10px; }

.share-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 16px; margin: 0 20px 16px; text-align: center; }

.share-score-big { font-size: 42px; font-weight: 700; color: var(--gold); line-height: 1; }

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;

// ── Data ──────────────────────────────────────────────────────────────────────
const CARDS = [{"topic":"Nature of God / Trinity","scripture":"Deuteronomy 6:4 (Shema)","criticism":"Proves strict monotheism—no room for three gods or humans becoming gods.","response":"One means united in purpose, not one being. The Godhead is three distinct persons perfectly one, as Jesus prayed in John 17."},{"topic":"Nature of God / Trinity","scripture":"John 1:1","criticism":"Jesus is fully God, part of the eternal Trinity—He wasn't created.","response":"Supports distinction: 'the Word was with God and the Word was God.' Father and Son are both divine but separate beings. Jesus is Jehovah, subordinate to the Father."},{"topic":"Nature of God / Trinity","scripture":"Isaiah 43:10","criticism":"God was never a man and no one becomes a god. No other gods exist.","response":"Spoken to Israel about false idols—no other God for them. Doesn't rule out other divine beings or exaltation through Christ."},{"topic":"Nature of God / Trinity","scripture":"John 4:24","criticism":"God has no body—Joseph's First Vision is false.","response":"Spirit doesn't mean incorporeal; the Father has a spirit body. Jesus said a spirit doesn't have flesh and bones as He does (Luke 24:39)."},{"topic":"Nature of God / Trinity","scripture":"Colossians 2:9","criticism":"Fullness of the Godhead in Christ bodily proves Trinity, not three separate beings.","response":"The Godhead is three distinct persons united in purpose. Christ has the fullness because He is Jehovah, God the Son."},{"topic":"Nature of God / Trinity","scripture":"Psalm 90:2","criticism":"God from everlasting to everlasting—never a man who progressed.","response":"The Father has always been God to us. His eternal nature doesn't contradict exaltation through Christ."},{"topic":"Nature of God / Trinity","scripture":"Malachi 3:6","criticism":"God cannot change from man to God.","response":"God's character and promises don't change. The verse isn't about His form or progression."},{"topic":"Nature of God / Trinity","scripture":"John 1:18 & 1 Timothy 6:16","criticism":"No man has seen God at any time—Joseph couldn't have seen the Father.","response":"Refers to seeing the Father in His full glory with mortal eyes. Glorified beings like Stephen and Joseph saw Him in vision."},{"topic":"Nature of God / Trinity","scripture":"Genesis 3:5","criticism":"The serpent's lie—humans can't become gods.","response":"Satan twisted the truth; God said we are created in His image and can become like Him through Christ."},{"topic":"Sufficiency of the Bible / Canon","scripture":"2 Timothy 3:16","criticism":"All scripture is God-breathed—Bible alone is enough, nothing else needed.","response":"It says scripture is profitable, not that it's the only scripture that will ever exist. Paul wasn't referring to his own letter as the complete final canon."},{"topic":"Sufficiency of the Bible / Canon","scripture":"Revelation 22:18-19","criticism":"Don't add to this book—no new scripture allowed.","response":"Refers only to the Book of Revelation itself—not the whole Bible. Deuteronomy 4:2 says the same about the law, yet more scripture followed."},{"topic":"Sufficiency of the Bible / Canon","scripture":"Deuteronomy 4:35,39 & Isaiah 44:6,8","criticism":"There is none else beside Him—no other gods at all.","response":"This is about there being no other God for Israel to worship. Doesn't preclude the Godhead or other exalted beings."},{"topic":"Sufficiency of the Bible / Canon","scripture":"Jeremiah 23:23-24","criticism":"God fills heaven and earth—can't be contained in a body.","response":"God's Spirit is omnipresent; the Father has a body but His influence and Spirit fill all things."},{"topic":"Prophets and False Prophets","scripture":"Deuteronomy 18:22","criticism":"If a prophet's words don't come true, he's false—Joseph Smith gave failed prophecies.","response":"The test applies to specific 'thus saith the Lord' predictions, not all prophetic speech. Biblical prophets like Jonah had conditional prophecies."},{"topic":"Prophets and False Prophets","scripture":"Deuteronomy 13:1-3","criticism":"If a prophet leads to other gods, don't follow—Joseph introduced new gods.","response":"Warns against idols and false gods unknown to Israel. Latter-day Saints worship the same God of Abraham—Father, Son, and Holy Ghost."},{"topic":"Prophets and False Prophets","scripture":"1 John 4:1 & Matthew 7:15","criticism":"Test the spirits—many false prophets; beware false prophets in sheep's clothing.","response":"We test by the Spirit, fruits, and consistency with Christ's gospel. The Book of Mormon points people to Christ; judge by fruits."},{"topic":"Prophets and False Prophets","scripture":"2 Peter 2:1","criticism":"False prophets bring destructive heresies—Joseph introduced false doctrines.","response":"The verse warns against those who deny the Lord; we affirm Christ as Savior and teach His true gospel restored."},{"topic":"Prophets and False Prophets","scripture":"Matthew 24:24","criticism":"False Christs and prophets will deceive many—Joseph Smith is one.","response":"True prophets are known by their fruits. The restored gospel brings millions closer to Christ."},{"topic":"Prophets and False Prophets","scripture":"Galatians 1:8","criticism":"Even an angel preaching another gospel is accursed—Moroni brought a different gospel.","response":"Paul defines the gospel as Christ's death, burial, and resurrection—exactly what we teach. The Book of Mormon clarifies truths lost over time."},{"topic":"Apostasy and Restoration","scripture":"Matthew 16:18","criticism":"Upon this rock I will build my church—gates of hell shall not prevail; true church never disappeared.","response":"The primitive church fell into apostasy as Paul and others predicted. Christ is restoring it through living prophets and apostles."},{"topic":"Apostasy and Restoration","scripture":"Acts 3:21","criticism":"Times of restitution of all things—just means Jesus comes back, nothing was lost.","response":"Peter says all things must be restored, which requires a restoration of priesthood, apostles, and lost truths."},{"topic":"Apostasy and Restoration","scripture":"Amos 8:11","criticism":"Famine of hearing the words of the Lord—just a warning, not total apostasy.","response":"The Bible shows the church lost plain doctrines and authority—exactly the prophesied famine."},{"topic":"Apostasy and Restoration","scripture":"2 Thessalonians 2:3","criticism":"Falling away comes first—just about the last days, not total loss of the church.","response":"Paul warned the early church itself would fall into apostasy before Christ's return—exactly what happened."},{"topic":"Apostasy and Restoration","scripture":"Hebrews 1:1-2","criticism":"God spoke by prophets in times past, now by His Son—no more prophets or new revelation.","response":"Christ is the chief cornerstone. Apostles and prophets continued in the New Testament church and were restored today."},{"topic":"Apostasy and Restoration","scripture":"James 1:5","criticism":"If any lack wisdom, ask of God—Joseph's First Vision unnecessary.","response":"The verse is exactly why Joseph prayed. God answered by sending prophets and more scripture, just like Bible times."},{"topic":"Salvation by Grace","scripture":"Ephesians 2:8-9","criticism":"Saved by grace through faith, not works—no 'after all we can do.'","response":"We're saved by grace after all we can do; the verse condemns earning salvation by the law, not rejecting repentance and ordinances."},{"topic":"Salvation by Grace","scripture":"1 Timothy 2:5","criticism":"One God, one mediator—Christ Jesus; no room for Joseph Smith or temple work.","response":"We agree Jesus is the only mediator; prophets and priesthood help us come to Him, they don't replace Him."},{"topic":"Salvation by Grace","scripture":"Ephesians 4:5","criticism":"One Lord, one faith, one baptism—LDS has extra ordinances and gods.","response":"The verse lists essentials of the gospel; the restored church has the same core faith and baptism by authority."},{"topic":"Book of Mormon - Anachronisms","scripture":"1 Nephi 18:25, Ether 9:19, Mosiah 9:9 (horses, elephants, steel, wheat)","criticism":"These didn't exist in pre-Columbian Americas—proves 19th-century fiction.","response":"Loan-shifting: Nephites used familiar Old World names for similar New World animals/plants. Some limited evidence exists; absence isn't proof of absence."},{"topic":"Book of Mormon - Anachronisms","scripture":"No mention of corn, beans, squash, pyramids, massive cities","criticism":"Real ancient American civilizations had these everywhere, yet BOM never mentions them.","response":"The text focuses on religious history, not full cultural survey. It does mention 'corn' (Mosiah 9:9 uses Hebrew word for grain)."},{"topic":"Book of Mormon - Anachronisms","scripture":"No evidence of writing systems or metal plates in ancient America","criticism":"Ancient Americans didn't write on metal or have complex writing matching BOM.","response":"Metal plates are rare but known in ancient world. New discoveries of ancient American writing continue to emerge."},{"topic":"Book of Mormon - Anachronisms","scripture":"Ether 15 (millions dead in final battle)","criticism":"Logistically impossible—no battlefield could hold that many; numbers ridiculous.","response":"Uses 'million' in sense of vast numbers, like the Bible; actual battlefield size never specified."},{"topic":"Book of Mormon - Textual Issues","scripture":"1830 edition had thousands of changes (e.g. 1 Nephi 11:18)","criticism":"If God's perfect word, why grammar fixes, name swaps, doctrinal tweaks? Man-made.","response":"Mostly spelling, grammar, printer errors. A few clarifications make meaning clearer—same message, better English. Joseph called it 'most correct' in doctrine."},{"topic":"Book of Mormon - Textual Issues","scripture":"Heavy KJV copying (25,000+ words, Isaiah 48-54 errors)","criticism":"Nephi quotes whole chapters of Isaiah and NT phrases centuries too early—19th-century plagiarism.","response":"Isaiah was one book in Lehi's time. God can inspire same words to different prophets. Restores plain truths lost from the Bible."},{"topic":"Book of Mormon - Textual Issues","scripture":"Anachronistic names (Nephi, Moroni, Zarahemla)","criticism":"All names are 19th-century inventions or from local geography/View of the Hebrews.","response":"Many have strong ancient parallels—Nephi from Egyptian, Moroni from Hebrew roots. Geography name coincidences work both ways."},{"topic":"Book of Mormon - Textual Issues","scripture":"View of the Hebrews (1823 Ethan Smith) parallels","criticism":"Joseph borrowed idea of ancient Hebrews in America splitting into civilized/savage groups.","response":"Similar high-level ideas but details and doctrines completely different. BOM contradicts many of its claims."},{"topic":"Book of Mormon - Textual Issues","scripture":"No evidence for reformed Egyptian or golden plates","criticism":"Reformed Egyptian unknown to linguists. Witnesses only saw in vision; plates taken back by angel.","response":"Plates were real—eleven witnesses handled them. Reformed Egyptian was practical shorthand, not a language we'd expect to find elsewhere."},{"topic":"Book of Mormon - Specific Passages","scripture":"Alma 7:10 ('born of Mary at Jerusalem')","criticism":"Jesus born in Bethlehem, not Jerusalem—basic geography error proves fake.","response":"Anciently 'at Jerusalem' often meant surrounding lands/region, like saying 'born at London' for a suburb."},{"topic":"Book of Mormon - Specific Passages","scripture":"2 Nephi 5:21 (skin of blackness as curse)","criticism":"Racist teaching that dark skin is a divine curse.","response":"Refers to spiritual or social separation, not race. Modern prophets have rejected any link between skin color and worthiness."},{"topic":"Book of Mormon - Specific Passages","scripture":"1 Nephi 16 (Liahona as magic compass)","criticism":"Too convenient—a magical ball that gives directions and changes writing. Pure fantasy.","response":"A divinely prepared tool, like the Urim and Thummim or brass serpent. God uses physical objects to teach faith."},{"topic":"Book of Mormon - Specific Passages","scripture":"John 10:16 & Ezekiel 37:16-17 (other sheep, two sticks)","criticism":"Other sheep = Gentiles; two sticks = reuniting Israel tribes, not Bible + BOM.","response":"Jesus visited other sheep in Americas (BOM). Two sticks symbolize two records—Bible and Book of Mormon—coming together in latter days."},{"topic":"Book of Mormon - DNA, Geography, Witnesses","scripture":"DNA evidence (Native American DNA Asian, not Middle Eastern)","criticism":"Proves no Lehi or Jaredite migration—Book of Mormon is fiction.","response":"BOM is limited group mixing into larger population. DNA swamped by genetic drift over 2,600 years. Church essay: DNA can neither prove nor disprove."},{"topic":"Book of Mormon - DNA, Geography, Witnesses","scripture":"No archaeological evidence or matching cities/battles","criticism":"Zero physical proof of millions of people, Hebrew culture, or BOM cities anywhere in Americas.","response":"Covers only a small limited area with limited population. Spiritual history, not travel guide. Absence of evidence isn't evidence of absence."},{"topic":"Book of Mormon - DNA, Geography, Witnesses","scripture":"Limited geography model (Mesoamerica or Heartland) doesn't match","criticism":"No model works—Heartland lacks civilizations, Mesoamerica has no Hebrew trace or massive battles.","response":"Church has no official geography position. Limited Mesoamerican model fits population, directions, and known cultures better."},{"topic":"Book of Mormon - DNA, Geography, Witnesses","scripture":"Three and Eight Witnesses (biased, vision only, some left Church)","criticism":"All related/friends of Joseph; three saw only vision, eight just hefted covered plates; some later left.","response":"Eleven men handled plates. Even those who left and became critics never denied their testimony to their dying day. Powerful evidence."},{"topic":"Book of Mormon - DNA, Geography, Witnesses","scripture":"DNA swamping argument (modern testing should detect tiny signatures)","criticism":"Even small groups would leave detectable Middle Eastern DNA—none found.","response":"DNA lost through drift and bottlenecks in much larger population. Studies inconclusive either way per Church essay."},{"topic":"Book of Mormon - DNA, Geography, Witnesses","scripture":"Heartland vs Mesoamerica debate","criticism":"Neither model fits all clues perfectly—proves the book is invented.","response":"No official position. Mesoamerica fits many directional and cultural clues better than continental Heartland view."},{"topic":"Book of Mormon - DNA, Geography, Witnesses","scripture":"Witnesses' credibility questioned","criticism":"Biased by family ties and money; some recanted or left.","response":"Sworn statements; never denied seeing/handling plates even after falling out with Joseph. Martin Harris reaffirmed on deathbed."}];

function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function noteKey(s) { return s.replace(/[^a-zA-Z0-9]/g,'_').substring(0,80); }
function useLocalStorage(key, init) {
  const [v, setV] = useState(() => { try { const s=localStorage.getItem(key); return s?JSON.parse(s):init; } catch { return init; } });
  const set = useCallback(val => { setV(val); try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key]);
  return [v, set];
}

// ── Sound + Haptic ────────────────────────────────────────────────────────────
function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if (type === 'got') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.12);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.24);
      gain.gain.setValueAtTime(0.25, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
    } else if (type === 'miss') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(330, ctx.currentTime);
      osc.frequency.setValueAtTime(220, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.35);
    } else if (type === 'flip') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(660, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.08, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.15);
    }
  } catch(e) {}
}
function haptic(type) {
  if (!navigator.vibrate) return;
  if (type === 'got') navigator.vibrate([10, 30, 10]);
  else if (type === 'miss') navigator.vibrate(120);
  else navigator.vibrate(8);
}

function scriptureUrl(ref) {
  return `https://www.churchofjesuschrist.org/search?lang=eng&query=${encodeURIComponent(ref)}`;

// Detect if a string is an actual scripture reference vs a descriptive title
function isScriptureRef(ref) {
  // Real refs contain chapter:verse pattern or start with a known book name
  if (/\d+:\d+/.test(ref)) return true;
  if (/^(Genesis|Exodus|Leviticus|Numbers|Deuteronomy|Joshua|Judges|Ruth|Samuel|Kings|Chronicles|Ezra|Nehemiah|Esther|Job|Psalm|Proverbs|Ecclesiastes|Isaiah|Jeremiah|Ezekiel|Daniel|Hosea|Joel|Amos|Obadiah|Jonah|Micah|Nahum|Habakkuk|Zephaniah|Haggai|Zechariah|Malachi|Matthew|Mark|Luke|John|Acts|Romans|Corinthians|Galatians|Ephesians|Philippians|Colossians|Thessalonians|Timothy|Titus|Philemon|Hebrews|James|Peter|Jude|Revelation|Nephi|Jacob|Enos|Jarom|Omni|Mosiah|Alma|Helaman|Mormon|Ether|Moroni)/i.test(ref.trim())) return true;
  return false;
}

const AuthContext = createContext(null);
function AuthProvider({ children }) {
  const [user, setUser] = useState(undefined);
  const [authError, setAuthError] = useState('');
  useEffect(() => { return auth.onAuthStateChanged(u => setUser(u || null)); }, []);
  const signIn = () => {
    setAuthError('');
    auth.signInWithPopup(googleProvider)
      .then(r => setUser(r.user))
      .catch(e => { setAuthError(e.message); console.error(e); });
  };
  const signOut = () => auth.signOut().then(() => setUser(null));
  return <AuthContext.Provider value={{ user, signIn, signOut, authError }}>{children}</AuthContext.Provider>;
}
function useAuth() { return useContext(AuthContext); }

// ── Notes hook ────────────────────────────────────────────────────────────────
function useNote(scriptureRef) {
  const { user } = useAuth();
  const [note, setNote] = useState('');
  const [status, setStatus] = useState('');
  const saveTimer = useRef(null);
  const key = noteKey(scriptureRef);
  useEffect(() => {
    if (!user) { setNote(''); return; }
    db.collection('users').doc(user.uid).collection('notes').doc(key).get()
      .then(doc => { if (doc.exists) setNote(doc.data().text || ''); })
      .catch(console.error);
  }, [user, key]);
  const saveNote = useCallback((text) => {
    setNote(text);
    if (!user) return;
    clearTimeout(saveTimer.current);
    setStatus('saving');
    saveTimer.current = setTimeout(() => {
      db.collection('users').doc(user.uid).collection('notes').doc(key)
        .set({ text, scripture: scriptureRef, updatedAt: firebase.firestore.FieldValue.serverTimestamp() })
        .then(() => { setStatus('saved'); setTimeout(() => setStatus(''), 2000); })
        .catch(console.error);
    }, 800);
  }, [user, key, scriptureRef]);
  return { note, saveNote, status };
}

  const [selected, setSelected] = useState(new Set(CATEGORIES));
  const [timed, setTimed] = useState(false);
  const toggle = cat => setSelected(prev => { const n=new Set(prev); if(n.has(cat)){if(n.size>1)n.delete(cat);}else n.add(cat); return n; });
  const cardCount = CARDS.filter(c => selected.has(c.topic)).length;
  return (
    <div className="screen cat-screen">
      <div className="top-bar">
        <button className="back-btn" onClick={onBack}>←</button>
        <h2>Choose Categories</h2>
      </div>
      <div style={{padding:'12px 20px 8px',display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
        <button onClick={() => setSelected(new Set(CATEGORIES))} style={{fontSize:12,fontFamily:'DM Sans',fontWeight:600,background:'var(--gold-light)',color:'var(--navy)',border:'none',borderRadius:50,padding:'6px 14px',cursor:'pointer'}}>All</button>
        {missedCards && missedCards.length > 0 && (
          <button onClick={() => onStart(null, timed, missedCards)} style={{fontSize:12,fontFamily:'DM Sans',fontWeight:600,background:'var(--red-light)',color:'var(--red)',border:'2px solid var(--red)',borderRadius:50,padding:'6px 14px',cursor:'pointer'}}>
            🔁 Review {missedCards.length} Missed
          </button>
        )}
        <span style={{fontSize:13,color:'var(--muted)'}}>{cardCount} selected</span>
      </div>
      <div className="cat-grid">
        {CATEGORIES.map(cat => {
          const meta = CAT_META[cat]||{icon:'📋',color:'#F0F0F0'};
          const count = CARDS.filter(c=>c.topic===cat).length;
          const on = selected.has(cat);
          return (
            <div key={cat} className={`cat-card ${on?'selected':''}`} onClick={() => toggle(cat)}>
              <div className="cat-icon" style={{background:meta.color}}>{meta.icon}</div>
              <div className="cat-info"><div className="cat-name">{cat}</div><div className="cat-count">{count} cards</div></div>
              <div className={`cat-check ${on?'on':''}`}>{on&&'✓'}</div>
            </div>
          );
        })}
      </div>
      <div style={{padding:'8px 20px 12px'}}>
        <p style={{fontSize:12,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:10}}>Mode</p>
        <div className="mode-row">
          <button className={`mode-btn ${!timed?'on':''}`} onClick={() => setTimed(false)}><span className="mode-icon">🃏</span>Flashcard</button>
          <button className={`mode-btn ${timed?'on':''}`} onClick={() => setTimed(true)}><span className="mode-icon">⏱️</span>Timed (30s)</button>
        </div>
      </div>
      <div className="start-bar">
        <button className="btn btn-primary btn-full" style={{fontSize:16,padding:'16px'}} onClick={() => onStart(Array.from(selected), timed, null)}>Start · {cardCount} Cards →</button>
      </div>
    </div>
  );
}

// ── Flash Card ────────────────────────────────────────────────────────────────
function FlashCard({ card, flipped, onFlip, scriptureOpen, onToggleScripture, scriptureText, scriptureLoading }) {
  const { signIn } = useAuth();
  const stopProp = e => e.stopPropagation();
  return (
    <div className="card-area">
      <div className="flip-wrapper" onClick={onFlip}>
        <div className={`flip-inner ${flipped?'flipped':''}`}>
          {/* FRONT */}
          <div className="card-face">
            <div className="card-label label-crit">⚠ Criticism</div>
            <div className="scripture-row">
              <button className="scripture-ref" onClick={e => { e.stopPropagation(); onToggleScripture(); }}>
                📖 {card.scripture} {scriptureOpen?'▲':'▼'}
              </button>
              {isScriptureRef(card.scripture) && (
                <a className="scripture-link" href={scriptureUrl(card.scripture)} target="_blank" rel="noopener" onClick={stopProp}>
                  🔗 Church Site
                </a>
              )}
            </div>
            <div className={`scripture-expand ${scriptureOpen?'open':''}`}>
              {scriptureLoading ? <span style={{color:'var(--muted)',fontSize:13}}>Loading scripture…</span> : <span style={{fontSize:14,lineHeight:1.7}}>{scriptureText}</span>}
            </div>
            <p className="criticism-text">{card.criticism}</p>
            {!flipped && <div className="flip-hint"><div className="flip-arrows">⟵ ⟶</div><div className="flip-hint-text">Tap card to reveal the LDS response</div></div>}
          </div>
          {/* BACK */}
          <div className="card-face card-back">
            <div className="card-label label-resp">✓ LDS Response</div>
            <div className="response-intro">📖 {card.scripture}</div>
            <p className="response-text">{card.response}</p>
            <NotesSection scriptureRef={card.scripture} onSignIn={signIn} />
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Game Screen ───────────────────────────────────────────────────────────────
function GameScreen({ categories, timed, customDeck, onDone, onBack }) {
  const deckRef = useRef(customDeck ? shuffle(customDeck) : shuffle(CARDS.filter(c => categories.includes(c.topic))));
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [scriptureOpen, setScriptureOpen] = useState(false);
  const [correct, setCorrect] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [timeLeft, setTimeLeft] = useState(30);
  const [results, setResults] = useState([]);
  const [missedCards, setMissedCards] = useState([]);
  const [scriptureText, setScriptureText] = useState('');
  const [scriptureLoading, setScriptureLoading] = useState(false);
  const scriptureCache = useRef({});
  const card = deckRef.current[idx];
  const total = deckRef.current.length;

  useEffect(() => {
    if (!timed || flipped) return;
    if (timeLeft <= 0) { grade(false); return; }
    const t = setTimeout(() => setTimeLeft(t => t - 1), 1000);
    return () => clearTimeout(t);
  }, [timed, flipped, timeLeft]);

  const flip = () => { playSound('flip'); haptic('flip'); setFlipped(f => !f); };

  const handleToggleScripture = async () => {
    if (scriptureOpen) { setScriptureOpen(false); return; }
    setScriptureOpen(true);
    const key = card.scripture;
    if (scriptureCache.current[key]) { setScriptureText(scriptureCache.current[key]); return; }
    if (!isScriptureRef(key)) {
      const msg = '📌 This card addresses a historical, textual, or archaeological claim rather than a specific scripture passage. No verse to display.';
      scriptureCache.current[key] = msg;
      setScriptureText(msg);
      return;
    }
    setScriptureLoading(true); setScriptureText('');
    try {
      const text = await window.claude.complete(`Quote the exact scripture text for: "${key}". If multiple verses, quote each one. Format: [Reference] "verse text" — one per line. No commentary.`);
      scriptureCache.current[key] = text; setScriptureText(text);
    } catch { setScriptureText('Please look up ' + key + ' in your scriptures.'); }
    setScriptureLoading(false);
  };

  const grade = (got) => {
    playSound(got ? 'got' : 'miss');
    haptic(got ? 'got' : 'miss');
    const nc = got ? correct+1 : correct;
    const ns = got ? streak+1 : 0;
    const nb = Math.max(bestStreak, ns);
    setCorrect(nc); setStreak(ns); setBestStreak(nb);
    const newMissed = got ? missedCards : [...missedCards, card];
    setMissedCards(newMissed);
    const newResults = [...results, { topic: card.topic, got }];
    setResults(newResults);
    if (idx+1 >= total) {
      onDone({ correct: nc, total, bestStreak: nb, results: newResults, missedCards: newMissed });
    } else {
      setIdx(i => i+1); setFlipped(false); setScriptureOpen(false); setScriptureText('');
      if (timed) setTimeLeft(30);
    }
  };

  return (
    <div className="screen game-screen">
      <div className="game-top">
        <button className="back-btn" onClick={onBack}>×</button>
        <div className="progress-wrap"><div className="progress-bar" style={{width:`${(idx/total)*100}%`}}></div></div>
        {timed && <div className={`timer-badge ${timeLeft<=10?'timer-warn':'timer-ok'}`}>⏱ {timeLeft}s</div>}
        {!timed && streak >= 2 && <div className="streak-badge">🔥 {streak}</div>}
      </div>
      <div className="game-meta">
        <span className="card-num">{idx+1} / {total}</span>
        <span style={{fontSize:13,color:'var(--muted)'}}>✓ {correct} correct</span>
      </div>
      <div className="category-tag">{card.topic}</div>
      <FlashCard card={card} flipped={flipped} onFlip={flip} scriptureOpen={scriptureOpen} onToggleScripture={handleToggleScripture} scriptureText={scriptureText} scriptureLoading={scriptureLoading} />
      <div className="grade-row">
        {!flipped ? (
          <button className="flip-to-grade" onClick={() => { playSound('flip'); haptic('flip'); setFlipped(true); }}>Reveal Answer ↓</button>
        ) : (
          <>
            <button className="grade-btn grade-miss" onClick={() => grade(false)}>✗ Missed It</button>
            <button className="grade-btn grade-got" onClick={() => grade(true)}>✓ Got It</button>
          </>
        )}
      </div>
    </div>
  );
}

// ── Results ───────────────────────────────────────────────────────────────────
function ResultsScreen({ data, onPlayAgain, onHome }) {
  const { correct, total, bestStreak, results, missedCards } = data;
  const pct = Math.round((correct/total)*100);
  const emoji = pct>=90?'🏆':pct>=70?'⭐':pct>=50?'💪':'📚';
  const title = pct>=90?'Outstanding!':pct>=70?'Well Done!':pct>=50?'Good Effort!':'Keep Studying!';
  const [copied, setCopied] = useState(false);
  const catMap = {};
  results.forEach(r => { if(!catMap[r.topic])catMap[r.topic]={got:0,total:0}; catMap[r.topic].total++; if(r.got)catMap[r.topic].got++; });

  const shareText = `📖 LDS Apologetics Challenge\n${emoji} ${title}\nScore: ${pct}% (${correct}/${total})\n🔥 Best Streak: ${bestStreak}\n\nTry it yourself!`;

  const handleShare = async () => {
    if (navigator.share) {
      try { await navigator.share({ title: 'LDS Apologetics Challenge', text: shareText }); return; } catch {}
    }
    try { await navigator.clipboard.writeText(shareText); setCopied(true); setTimeout(() => setCopied(false), 2500); } catch {}
  };

  return (
    <div className="screen results-screen" style={{overflowY:'auto'}}>
      <div className="results-hero">
        <div className="results-emoji">{emoji}</div>
        <div className="results-title">{title}</div>
        <div className="results-sub">You answered {correct} of {total} correctly</div>
        <div className="results-score">{pct}%</div>
        <div className="results-score-label">Score</div>
      </div>
      <div className="results-stats">
        <div className="results-stat"><div className="v" style={{color:'#7EC8A0'}}>{correct}</div><div className="l">Correct</div></div>
        <div className="results-stat"><div className="v" style={{color:'#E88080'}}>{total-correct}</div><div className="l">Missed</div></div>
        <div className="results-stat"><div className="v" style={{color:'var(--gold)'}}>🔥{bestStreak}</div><div className="l">Streak</div></div>
      </div>

      {/* Share card */}
      <div className="share-card">
        <div className="share-card-title">Share Your Score</div>
        <div className="share-score-big">{pct}%</div>
        <div className="share-detail">{correct}/{total} correct · 🔥{bestStreak} streak · {emoji} {title}</div>
        <button className="share-btn" onClick={handleShare}>
          {navigator.share ? '↗ Share' : '📋 Copy Score'}
        </button>
        {copied && <div className="copied-badge">✓ Copied to clipboard!</div>}
      </div>

      <div className="results-breakdown">
        <h3>By Category</h3>
        {Object.entries(catMap).map(([cat, d]) => (
          <div className="result-row" key={cat}>
            <div className="result-row-name">{cat.replace('Book of Mormon - ','BOM: ')}</div>
            <div className="result-row-bar"><div className="result-row-fill" style={{width:`${(d.got/d.total)*100}%`}}></div></div>
            <div className="result-row-pct">{d.got}/{d.total}</div>
          </div>
        ))}
      </div>

      <div className="results-actions">
        {missedCards && missedCards.length > 0 && (
          <button className="btn btn-full" style={{padding:'14px',background:'var(--red-light)',color:'var(--red)',border:'2px solid var(--red)',borderRadius:14,fontFamily:'DM Sans',fontSize:15,fontWeight:700,cursor:'pointer'}}
            onClick={() => onPlayAgain(missedCards)}>
            🔁 Drill {missedCards.length} Missed Card{missedCards.length!==1?'s':''}
          </button>
        )}
        <button className="btn btn-gold btn-full" style={{padding:'16px'}} onClick={() => onPlayAgain(null)}>Play Again →</button>
        <button className="btn btn-outline btn-full" style={{padding:'14px',color:'rgba(255,255,255,0.7)',borderColor:'rgba(255,255,255,0.2)'}} onClick={onHome}>Home</button>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('home');
  const [gameConfig, setGameConfig] = useState(null);
  const [gameResult, setGameResult] = useState(null);
  const [lastMissed, setLastMissed] = useState([]);
  const [stats, setStats] = useLocalStorage('lds_stats', { totalCorrect:0, bestStreak:0, gamesPlayed:0 });

  const startGame = (categories, timed, customDeck) => {
    setGameConfig({ categories, timed, customDeck });
    setScreen('game');
  };

  const finishGame = (result) => {
    setGameResult(result);
    setLastMissed(result.missedCards || []);
    setStats({ totalCorrect: stats.totalCorrect+result.correct, bestStreak: Math.max(stats.bestStreak, result.bestStreak), gamesPlayed: stats.gamesPlayed+1 });
    setScreen('results');
  };

  return (
    <AuthProvider>
      {screen === 'home' && <HomeScreen onPlay={() => setScreen('category')} stats={stats} />}
      {screen === 'category' && <CategoryScreen onBack={() => setScreen('home')} onStart={startGame} missedCards={lastMissed} />}
      {screen === 'game' && <GameScreen categories={gameConfig.categories} timed={gameConfig.timed} customDeck={gameConfig.customDeck} onDone={finishGame} onBack={() => setScreen('home')} />}
      {screen === 'results' && <ResultsScreen data={gameResult} onPlayAgain={(missed) => { if(missed) startGame(null, false, missed); else setScreen('category'); }} onHome={() => setScreen('home')} />}
    </AuthProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
